name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        run: git clone --depth 1 --branch $GITHUB_REF_NAME https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install JDK 25
        run: |
          curl -sL https://api.adoptium.net/v3/binary/latest/25/ea/linux/x64/jdk/hotspot/normal/eclipse -o jdk.tar.gz
          mkdir -p $HOME/jdk && tar xzf jdk.tar.gz -C $HOME/jdk --strip-components=1
          echo "$HOME/jdk/bin" >> $GITHUB_PATH
          echo "JAVA_HOME=$HOME/jdk" >> $GITHUB_ENV

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Build uber-jar
        run: |
          mvn package -Prelease -DskipTests
          cp target/incus-spawn-*-runner.jar target/incus-spawn-runner.jar

      - name: Build native image
        run: |
          mvn package -Dnative -Dquarkus.native.container-build=true -DskipTests
          cp target/incus-spawn-*-runner target/incus-spawn-linux-amd64

      - name: Create GitHub Release
        run: |
          gh release create $GITHUB_REF_NAME \
            target/incus-spawn-runner.jar \
            target/incus-spawn-linux-amd64 \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump POM to next snapshot
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEXT="${major}.${minor}.$((patch + 1))-SNAPSHOT"
          mvn versions:set -DnewVersion=$NEXT -DgenerateBackupPoms=false
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "Bump version to $NEXT after $GITHUB_REF_NAME release"
          git push origin HEAD:main
